<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <p id="count">Total number of items in cart:</p>
    <button id="add" onclick="add()">Add to cart</button>
    <button id="remove" onclick="remove()">Remove from cart</button>
    <button id="clear" onclick="zero()">Clear the cart</button>
    <script>
            let cart = 0;
            document.getElementById("count").innerText = "Total number of items in cart:"+cart;
            function add() {
                cart++;
                document.getElementById("count").innerText = "Total number of items in cart:"+cart;
            }

            function remove() {
                cart--;
                document.getElementById("count").innerText = "Total number of items in cart:"+cart;
            }

            function zero() {
                cart=0;
                document.getElementById("count").innerText = "Total number of items in cart:"+cart;
            }
    </script>
</body>
</html>
